name: CI/CD Pipeline - ms-emergencias

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          PORT: 3006
          DB_USER: ${{ secrets.DB_USER || 'test_user' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'test_password' }}
          DB_NAME: test_db
          DB_HOST_LOCAL: localhost
          DB_PORT_LOCAL: 5432

          INTERNAL_SECRET_TOKEN: ${{ secrets.INTERNAL_SECRET_TOKEN || 'mock-test-token' }}
          EUREKA_HOST: localhost
          API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL || 'http://mock-gateway:3000' }}

          BOMBEROS_API_URL: ${{ secrets.BOMBEROS_API_URL || 'https://mock.bomberos.cl' }}
          BOMBEROS_API_KEY: ${{ secrets.BOMBEROS_API_KEY || 'mock-api-key' }}
          CONAF_API_URL: ${{ secrets.CONAF_API_URL || 'https://mock.conaf.cl' }}
          CONAF_API_KEY: ${{ secrets.CONAF_API_KEY || 'mock-conaf-key' }}
          CARABINEROS_API_URL: ${{ secrets.CARABINEROS_API_URL || 'https://mock.carabineros.cl' }}
          CARABINEROS_API_KEY: ${{ secrets.CARABINEROS_API_KEY || 'mock-carabineros-key' }}
          SENAPRED_API_URL: ${{ secrets.SENAPRED_API_URL || 'https://mock.senapred.cl' }}
          SENAPRED_API_KEY: ${{ secrets.SENAPRED_API_KEY || 'mock-senapred-key' }}

      - name: Build Project
        run: npm run build

